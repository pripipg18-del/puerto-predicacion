<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#3c83f6",
                        "background-light": "#f5f7f8",
                        "background-dark": "#101722",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>Mostrar en Pantalla Grande</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex h-screen w-full flex-col overflow-hidden">
<!-- Header / Top Bar -->
<header class="flex items-center justify-between p-4 border-b border-slate-200 dark:border-slate-800">
<button class="flex items-center justify-center size-10 rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined text-slate-600 dark:text-slate-400">close</span>
</button>
<h2 class="text-lg font-bold tracking-tight text-slate-900 dark:text-slate-100">Mostrar en pantalla grande</h2>
<button class="flex items-center justify-center size-10 rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined text-slate-600 dark:text-slate-400">content_copy</span>
</button>
</header>
<!-- Main Content Area (Phrase) -->
<main class="flex-1 flex flex-col items-center justify-center px-6 text-center">
<div class="w-full max-w-4xl mx-auto">
<h1 class="text-5xl md:text-7xl lg:text-8xl font-bold leading-tight tracking-tight text-slate-900 dark:text-white break-words">
                    ¡Hola! ¿Cómo estás?
                </h1>
</div>
</main>
<!-- Phrase Navigation Buttons -->
<div class="flex items-center justify-between px-6 pb-8 gap-4">
<button class="flex flex-1 items-center justify-center gap-2 h-14 rounded-xl bg-slate-200 dark:bg-slate-800 font-semibold hover:opacity-90 transition-opacity">
<span class="material-symbols-outlined">chevron_left</span>
<span>Anterior</span>
</button>
<button class="flex flex-1 items-center justify-center gap-2 h-14 rounded-xl bg-slate-200 dark:bg-slate-800 font-semibold hover:opacity-90 transition-opacity">
<span>Siguiente</span>
<span class="material-symbols-outlined">chevron_right</span>
</button>
</div>
<!-- Controls Section -->
<div class="bg-slate-50 dark:bg-slate-900/50 border-t border-slate-200 dark:border-slate-800 p-6 space-y-6">
<!-- Speed Selector -->
<div class="flex items-center gap-4">
<span class="text-sm font-medium text-slate-500 dark:text-slate-400">Velocidad:</span>
<div class="flex flex-1 h-12 items-center justify-center rounded-xl bg-slate-200 dark:bg-slate-800 p-1">
<label class="flex cursor-pointer h-full grow items-center justify-center overflow-hidden rounded-lg px-2 has-[:checked]:bg-white dark:has-[:checked]:bg-slate-700 has-[:checked]:shadow-sm text-slate-500 dark:text-slate-400 has-[:checked]:text-primary text-sm font-bold transition-all">
<span>0.5x</span>
<input class="hidden" name="speed" type="radio" value="0.5x"/>
</label>
<label class="flex cursor-pointer h-full grow items-center justify-center overflow-hidden rounded-lg px-2 has-[:checked]:bg-white dark:has-[:checked]:bg-slate-700 has-[:checked]:shadow-sm text-slate-500 dark:text-slate-400 has-[:checked]:text-primary text-sm font-bold transition-all">
<span>1x</span>
<input checked="" class="hidden" name="speed" type="radio" value="1x"/>
</label>
<label class="flex cursor-pointer h-full grow items-center justify-center overflow-hidden rounded-lg px-2 has-[:checked]:bg-white dark:has-[:checked]:bg-slate-700 has-[:checked]:shadow-sm text-slate-500 dark:text-slate-400 has-[:checked]:text-primary text-sm font-bold transition-all">
<span>1.5x</span>
<input class="hidden" name="speed" type="radio" value="1.5x"/>
</label>
</div>
</div>
<!-- Pronounce Action -->
<button class="w-full flex items-center justify-center gap-3 h-16 rounded-xl bg-primary text-white font-bold text-xl shadow-lg shadow-primary/20 active:scale-95 transition-transform">
<span class="material-symbols-outlined text-3xl">volume_up</span>
<span>Pronunciar</span>
</button>
</div>
<!-- Bottom Navigation Bar -->
<nav class="flex border-t border-slate-200 dark:border-slate-800 bg-white dark:bg-background-dark px-4 pb-6 pt-2">
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-500 hover:text-primary dark:hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">home</span>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined fill-1">translate</span>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-500 hover:text-primary dark:hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">history</span>
</a>
</nav>
</div>
</body></html>
